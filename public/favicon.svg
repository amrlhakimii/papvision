<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Brand-coloured rounded square background -->
  <rect width="32" height="32" rx="7" fill="#364F6B"/>

  <!-- Microscope: eyepiece -->
  <rect x="12.5" y="4" width="7" height="2.5" rx="1.25" fill="white"/>
  <!-- Body tube -->
  <rect x="14.5" y="6.5" width="3" height="7" rx="1" fill="white"/>
  <!-- Revolving nosepiece -->
  <rect x="11" y="13.5" width="10" height="2" rx="1" fill="white"/>
  <!-- Objective lens -->
  <rect x="15" y="15.5" width="2" height="4" rx="1" fill="white"/>
  <!-- Stage -->
  <rect x="9" y="19.5" width="14" height="2" rx="1" fill="white"/>
  <!-- Left support pillar -->
  <rect x="9.5" y="21.5" width="2.5" height="4" rx="1" fill="white"/>
  <!-- Right support pillar -->
  <rect x="20" y="21.5" width="2.5" height="4" rx="1" fill="white"/>
  <!-- Base -->
  <rect x="8" y="25.5" width="16" height="2.5" rx="1.25" fill="white"/>
</svg>
